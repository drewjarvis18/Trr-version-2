const { useRef, useEffect, useState, useCallback } = React;

/* ── HOOKS ── */
function useReveal(margin = "-8%") {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setVis(true); obs.disconnect(); }
    }, { rootMargin: margin });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, vis];
}

function useScrolled(threshold = 60) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > threshold);
    window.addEventListener("scroll", fn, { passive: true });
    return () => window.removeEventListener("scroll", fn);
  }, [threshold]);
  return scrolled;
}

/* ── HELPERS ── */
function Reveal({ children, delay = "", className = "", style = {}, tag: Tag = "div" }) {
  const [ref, vis] = useReveal();
  return <Tag ref={ref} className={`reveal ${delay} ${vis ? "visible" : ""} ${className}`} style={style}>{children}</Tag>;
}

function BlurText({ text, delayBase = 0 }) {
  const [ref, vis] = useReveal("-5%");
  return (
    <span ref={ref}>
      {text.split(" ").map((w, i) => (
        <span key={i} className={"blur-word" + (vis ? " visible" : "")}
          style={{ transitionDelay: `${delayBase + i * 0.09}s` }}>{w}</span>
      ))}
    </span>
  );
}
