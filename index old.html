<script type="text/babel">
const { useRef, useEffect, useState } = React;

/* ── INTERSECTION OBSERVER HOOK ── */
function useReveal(margin = "-10%") {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setVisible(true); obs.disconnect(); }
    }, { rootMargin: margin });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

/* ── BLUR TEXT ── */
function BlurText({ text, delayBase = 0 }) {
  const words = text.split(" ");
  const [ref, visible] = useReveal("-5%");
  return (
    <span ref={ref}>
      {words.map((w, i) => (
        <span
          key={i}
          className={"blur-word" + (visible ? " visible" : "")}
          style={{ transitionDelay: `${delayBase + i * 0.1}s` }}
        >{w}</span>
      ))}
    </span>
  );
}

/* ── REVEAL WRAPPER ── */
function Reveal({ children, delay = "", className = "", tag: Tag = "div" }) {
  const [ref, visible] = useReveal("-8%");
  return (
    <Tag ref={ref} className={`reveal ${delay} ${visible ? "visible" : ""} ${className}`}>
      {children}
    </Tag>
  );
}
